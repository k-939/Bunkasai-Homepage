<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    a {
        text-decoration: none;
        color: #333;
    }

    body {
        font-family: 'Oswald', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #header {
        height: 64px;
    }


    @media (min-width: 769px) {
        .main-nav {
            z-index: 1000;
        }

        .smartphone-nav {
            display: none;
        }

        .header {
            background: color-mix(in srgb, var(--color-surface, #ffffff) 88%, transparent);
            color: #333;
            /* header text dark by default */
            padding: 1rem 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            border-bottom: var(--border, 1px solid #ddd);
            backdrop-filter: saturate(120%) blur(10px);
            z-index: 1000;
        }

        .main-nav {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
    }

    @media (max-width: 768px) {
        .header {
            display: none;
        }

        #header {
            height: 0;
        }

        body {
            top: 0;
        }

        .smartphone-nav {
            display: block;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: color-mix(in srgb, var(--color-surface, #ffffff) 88%, transparent);
            border-top: var(--border, 1px solid #ddd);
            backdrop-filter: saturate(120%) blur(10px);
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .bottom-nav {
            display: flex;
            justify-content: space-between;
            list-style: none;
            padding: 1rem;
            align-items: center;
        }

        .bottom-nav > li {
            flex: 1 1 0;
            min-width: 0;
        }

        .bottom-nav a { 
            display: flex;
            flex-direction: column; 
            align-items: center;
            width: 100%;
            text-align: center;
        }

        .bottom-nav a svg {
            width: 1.35em;
            height: 1.35em;
            display: inline-block;
            flex: none;
            vertical-align: -0.125em;
            fill: currentColor;
        }
    }

    @media (prefers-color-scheme: dark) {
        .header {
            background: color-mix(in srgb, var(--color-surface, #000000) 88%, transparent);
            color: #fff;
        }

        .logo a,
        .logo a:visited {
            color: #fff;
        }

        .main-nav>li>a {
            color: #fff;
        }

        .main-nav>li>a:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }

        .smartphone-nav {
            background: color-mix(in srgb, var(--color-surface, #000000) 88%, transparent);
        }

        .bottom-nav a {
            color: #fff;
        }
    }
</style>

</head>
